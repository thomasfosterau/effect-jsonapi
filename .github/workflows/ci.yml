name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# No permissions by default; the single job grants only read access.
permissions: {}

jobs:
  check:
    name: Lint, type-check, build & test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Installs the pnpm version pinned by the package.json "packageManager"
      # field. Must run before setup-node so its pnpm cache can find the store.
      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      # --ignore-scripts blocks dependency lifecycle scripts (a common
      # supply-chain attack vector) from running in CI. --frozen-lockfile
      # fails if pnpm-lock.yaml is out of sync with the manifests.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Lint
        run: pnpm run lint

      - name: Check formatting
        run: pnpm run format:check

      - name: Type-check (incl. type-level tests)
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test

      # Type-checks AND runs every JSDoc @example, and generates the API docs.
      - name: Verify documentation examples (docgen)
        run: pnpm run docgen
