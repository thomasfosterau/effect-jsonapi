name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# No permissions by default; the single job grants only read access.
permissions: {}

jobs:
  check:
    name: Lint, type-check, build & test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      # --ignore-scripts blocks dependency lifecycle scripts (a common
      # supply-chain attack vector) from running in CI.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Type-check (incl. type-level tests)
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      # Type-checks AND runs every JSDoc @example, and generates the API docs.
      - name: Verify documentation examples (docgen)
        run: npm run docgen
