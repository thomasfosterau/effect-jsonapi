name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}

permissions:
  contents: write # create the release commit/tag and the "Version Packages" PR
  pull-requests: write # open/update the "Version Packages" PR
  id-token: write # npm provenance (publish with --provenance)

jobs:
  release:
    name: Version or publish
    # Avoid running on forks, where the NPM_TOKEN secret is unavailable.
    if: github.repository == 'thomasfosterau/effect-jsonapi'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Opens/updates a "Version Packages" PR when changesets are pending.
      # Merging that PR re-runs this job, which then publishes to npm.
      #
      # Requires an NPM_TOKEN repository secret (an npm automation token with
      # publish rights to the @thomasfosterau scope). GITHUB_TOKEN is provided
      # automatically by Actions.
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: npm run version
          publish: npm run release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
