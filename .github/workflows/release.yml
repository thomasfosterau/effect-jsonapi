name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}

# No permissions by default; the release job opts into exactly what it needs.
permissions: {}

jobs:
  release:
    name: Version or publish
    # Never run on forks (they have neither the environment nor the trusted
    # publisher binding, so a fork cannot publish on your behalf).
    if: github.repository == 'thomasfosterau/effect-jsonapi'
    runs-on: ubuntu-latest
    # Requires manual approval via a protected GitHub Environment named
    # "release". See PUBLISHING.md for the one-time setup.
    environment: release
    permissions:
      contents: write # push the version commit/tag and the "Version Packages" PR branch
      pull-requests: write # open/update the "Version Packages" PR
      id-token: write # OIDC: prove this workflow's identity to npm (no token needed)
    steps:
      - name: Checkout
        # The Changesets action pushes the version branch, so it needs the
        # checkout's git credentials (the ephemeral, job-scoped GITHUB_TOKEN).
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Installs the pnpm version pinned by the package.json "packageManager"
      # field. Must run before setup-node so its pnpm cache can find the store.
      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.x
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # The publish step uses the npm CLI (not pnpm) so it can use npm OIDC
      # Trusted Publishing, which requires npm >= 11.5.1. pnpm does not yet
      # support OIDC trusted publishing (https://github.com/pnpm/pnpm/issues/9812).
      - name: Upgrade npm (OIDC trusted publishing)
        run: npm install -g npm@latest

      # --ignore-scripts stops a compromised dependency from running install
      # scripts in the privileged publish job (the Shai-Hulud vector).
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build
        run: pnpm run build

      # When changesets are pending, this opens/updates a "Version Packages" PR
      # (via `pnpm run version`). Once that PR is merged (no changesets remain),
      # it runs `pnpm run release`, which publishes with `npm publish` (OIDC
      # trusted publishing — there is no NPM_TOKEN to steal; provenance is
      # attached automatically) and then `changeset tag`. The action parses the
      # "New tag:" output, pushes the tags and creates the GitHub releases.
      - name: Create release PR or publish to npm
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: pnpm run version
          publish: pnpm run release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
